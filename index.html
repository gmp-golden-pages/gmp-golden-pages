<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GMP Golden Pages</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Great+Vibes&display=swap" rel="stylesheet">

  <style>
    :root{
      --gold: #b88a2f;
      --gold-dark: #8d651f;
      --gold-light: #dec07a;
      --ink: #1b1712;
      --brown: #4b2d12;
      --brown-dark: #261407;
      --paper: #f6ecd7;
      --paper-2: #efe0bf;
      --line: rgba(158, 114, 34, 0.6);
      --shadow: rgba(0,0,0,0.22);
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family: "Cormorant Garamond", serif;
      background:
        linear-gradient(rgba(30,16,6,0.20), rgba(30,16,6,0.25)),
        url("https://images.unsplash.com/photo-1507842217343-583bb7270b66?q=80&w=1800&auto=format&fit=crop")
        center center / cover no-repeat fixed;
      color: var(--ink);
      min-height:100vh;
    }

    .page{
      position: relative;
      min-height:100vh;
      overflow:hidden;
      padding: 28px 16px 34px;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    /* Βιβλιοθήκες αριστερά/δεξιά */
    .shelf{
      position:absolute;
      top:0;
      bottom:0;
      width: 24%;
      min-width: 150px;
      background-size: cover;
      background-position:center;
      filter: saturate(1.08) contrast(1.04);
      z-index:1;
      box-shadow: inset 0 0 60px rgba(0,0,0,0.30);
    }

    .shelf.left{
      left:0;
      background-image:
        linear-gradient(rgba(34,17,7,0.20), rgba(34,17,7,0.30)),
        url("https://images.unsplash.com/photo-1521587760476-6c12a4b040da?q=80&w=1200&auto=format&fit=crop");
      background-position:left center;
      border-right: 2px solid rgba(122,82,18,0.45);
    }

    .shelf.right{
      right:0;
      background-image:
        linear-gradient(rgba(34,17,7,0.20), rgba(34,17,7,0.30)),
        url("https://images.unsplash.com/photo-1524995997946-a1c2e315a42f?q=80&w=1200&auto=format&fit=crop");
      background-position:right center;
      border-left: 2px solid rgba(122,82,18,0.45);
    }

    .center-wrap{
      position:relative;
      z-index:2;
      width:min(860px, 92vw);
      margin: 0 auto;
      padding: 44px 28px 110px;
      text-align:center;
      background:
        linear-gradient(rgba(250,244,229,0.95), rgba(242,229,199,0.95));
      border: 2px solid rgba(177,130,41,0.55);
      border-radius: 18px;
      box-shadow:
        0 25px 60px rgba(0,0,0,0.25),
        inset 0 0 0 1px rgba(255,255,255,0.35);
    }

    /* Εσωτερικό διακοσμητικό πλαίσιο */
    .center-wrap::before{
      content:"";
      position:absolute;
      inset:14px;
      border: 2px solid rgba(176,127,39,0.55);
      border-radius: 12px;
      pointer-events:none;
    }

    .corner{
      position:absolute;
      width:36px;
      height:36px;
      border-color: rgba(176,127,39,0.9);
      z-index:3;
      pointer-events:none;
    }

    .corner.tl{ top:24px; left:24px; border-top:2px solid; border-left:2px solid; border-top-left-radius:8px; }
    .corner.tr{ top:24px; right:24px; border-top:2px solid; border-right:2px solid; border-top-right-radius:8px; }
    .corner.bl{ bottom:24px; left:24px; border-bottom:2px solid; border-left:2px solid; border-bottom-left-radius:8px; }
    .corner.br{ bottom:24px; right:24px; border-bottom:2px solid; border-right:2px solid; border-bottom-right-radius:8px; }

    .ornament{
      font-size: 30px;
      line-height:1;
      color: var(--gold);
      margin-bottom: 8px;
      letter-spacing:2px;
    }

    .gmp{
      font-family: "Great Vibes", cursive;
      font-size: clamp(88px, 12vw, 170px);
      line-height: 0.92;
      color: #b1842e;
      text-shadow:
        0 1px 0 #fff6d8,
        0 2px 0 #f0dcab,
        0 6px 14px rgba(89,57,13,0.18);
      margin-bottom: 6px;
    }

    .title{
      font-family: "Great Vibes", cursive;
      font-size: clamp(52px, 7vw, 92px);
      line-height:1;
      color: #18130e;
      margin-bottom: 8px;
    }

    .mini-ornament{
      width: 180px;
      max-width: 80%;
      height: 18px;
      margin: 0 auto 14px;
      position: relative;
    }

    .mini-ornament::before,
    .mini-ornament::after{
      content:"";
      position:absolute;
      top:50%;
      width:42%;
      height:1.8px;
      background: linear-gradient(to right, transparent, var(--gold), transparent);
    }

    .mini-ornament::before{ left:0; }
    .mini-ornament::after{ right:0; }

    .mini-ornament span{
      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%,-52%);
      color: var(--gold);
      font-size: 22px;
    }

    .subtitle{
      font-size: clamp(28px, 3.2vw, 40px);
      color: #5a4025;
      margin-bottom: 34px;
    }

    .book-card{
      width:min(420px, 92%);
      margin: 0 auto;
      background: linear-gradient(180deg, rgba(252,247,236,0.96), rgba(238,224,192,0.96));
      border: 2px solid rgba(177,130,41,0.62);
      border-radius: 14px;
      padding: 22px 20px;
      display:flex;
      align-items:center;
      gap:18px;
      text-align:left;
      box-shadow:
        0 14px 28px rgba(79,49,12,0.13),
        inset 0 0 0 1px rgba(255,255,255,0.35);
      position:relative;
      z-index:2;
    }

    .book-card::before{
      content:"";
      position:absolute;
      inset:8px;
      border:1px solid rgba(177,130,41,0.30);
      border-radius:10px;
      pointer-events:none;
    }

    .book-icon{
      flex: 0 0 86px;
      width:86px;
      height:86px;
      border-radius:12px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size: 44px;
      color: var(--gold-dark);
      background: linear-gradient(180deg, #f7edd2, #ead6a4);
      border: 1px solid rgba(171,123,34,0.35);
      box-shadow: inset 0 4px 10px rgba(255,255,255,0.45);
    }

    .book-card h3{
      font-size: clamp(38px, 4vw, 52px);
      color:#5a3c17;
      margin-bottom: 4px;
      font-weight:600;
    }

    .book-card p{
      font-size: clamp(24px, 2.4vw, 31px);
      color:#5b4531;
      line-height:1.18;
    }

    .open-book{
      position:absolute;
      left:50%;
      bottom: 28px;
      transform:translateX(-50%);
      width:min(160px, 42vw);
      height:52px;
      z-index:2;
    }

    .open-book::before,
    .open-book::after{
      content:"";
      position:absolute;
      top:0;
      width:48%;
      height:100%;
      background: linear-gradient(180deg, #fef6de, #d9bd82);
      border: 1px solid rgba(163,117,31,0.45);
      box-shadow: 0 8px 18px rgba(0,0,0,0.10);
    }

    .open-book::before{
      left:0;
      border-radius: 0 0 0 40px;
      transform: skewY(9deg);
    }

    .open-book::after{
      right:0;
      border-radius: 0 0 40px 0;
      transform: skewY(-9deg);
    }

    .open-book .spine{
      position:absolute;
      left:50%;
      top:0;
      transform:translateX(-50%);
      width:14px;
      height:52px;
      background: linear-gradient(180deg, #c99839, #8b5d19);
      border-radius: 0 0 10px 10px;
      z-index:3;
      box-shadow: 0 5px 10px rgba(0,0,0,0.12);
    }

    .footer-line{
      position:absolute;
      left:50%;
      transform:translateX(-50%);
      bottom: 10px;
      width: 220px;
      height: 20px;
      display:flex;
      align-items:center;
      justify-content:center;
      color: var(--gold);
      font-size: 22px;
    }

    @media (max-width: 900px){
      .shelf{
        width:18%;
        min-width: 78px;
      }

      .center-wrap{
        padding: 34px 16px 92px;
      }

      .book-card{
        flex-direction:column;
        text-align:center;
        gap:12px;
      }

      .book-icon{
        width:72px;
        height:72px;
        flex-basis:72px;
        font-size:38px;
      }
    }

    @media (max-width: 640px){
      .page{
        padding: 10px 6px 22px;
      }

      .shelf{
        display:none;
      }

      .center-wrap{
        width:96vw;
      }

      .subtitle{
        margin-bottom: 24px;
      }

      .open-book{
        bottom: 22px;
      }
    }
  </style>
</head>
<body>

  <main class="page">
    <div class="shelf left"></div>
    <div class="shelf right"></div>

    <section class="center-wrap">
      <span class="corner tl"></span>
      <span class="corner tr"></span>
      <span class="corner bl"></span>
      <span class="corner br"></span>

      <div class="ornament">❦</div>

      <h1 class="gmp">GMP</h1>
      <h2 class="title">Golden Pages</h2>

      <div class="mini-ornament">
        <span>✦</span>
      </div>

      <p class="subtitle">Ο κόσμος των βιβλίων στα χέρια σου</p>

      <div class="book-card">
        <div class="book-icon">📖</div>

        <div class="book-info">
          <h3>Βιβλία</h3>
          <p>Ανακάλυψε χιλιάδες βιβλία<br>σε κάθε είδος και εποχή.</p>
        </div>
      </div>

      <div class="open-book">
        <div class="spine"></div>
      </div>

      <div class="footer-line">❦</div>
    </section>
  </main>

</body>
        </html>
