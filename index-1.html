<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GMP Golden Pages</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Great+Vibes&display=swap" rel="stylesheet">

  <style>
    :root{
      --gold:#b8892f;
      --gold-deep:#9a6d1f;
      --gold-soft:#d8b56a;
      --brown-dark:#3e2412;
      --brown-mid:#5b3a1d;
      --brown-soft:#6b4a2a;
      --paper:rgba(248,240,225,0.92);
      --paper-2:rgba(239,227,199,0.90);
    }

    *{margin:0;padding:0;box-sizing:border-box;}

    body{
      font-family:"Cormorant Garamond", serif;
      color:var(--brown-dark);
      min-height:100vh;
      background:
        linear-gradient(rgba(27,14,6,0.16), rgba(27,14,6,0.22)),
        url("https://images.unsplash.com/photo-1507842217343-583bb7270b66?q=80&w=1800&auto=format&fit=crop")
        center center / cover no-repeat fixed;
    }

    .page{
      position:relative;
      min-height:100vh;
      overflow:hidden;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px 10px 24px;
    }

    .shelf{
      position:absolute;
      top:0; bottom:0;
      width:22%;
      min-width:120px;
      background-size:cover;
      background-repeat:no-repeat;
      z-index:1;
      filter:saturate(1.05) contrast(1.02) brightness(0.92);
      box-shadow:inset 0 0 60px rgba(0,0,0,0.28);
    }

    .shelf.left{
      left:0;
      background-image:
        linear-gradient(rgba(28,15,6,0.12), rgba(28,15,6,0.22)),
        url("https://images.unsplash.com/photo-1521587760476-6c12a4b040da?q=80&w=1200&auto=format&fit=crop");
      background-position:left center;
    }

    .shelf.right{
      right:0;
      background-image:
        linear-gradient(rgba(28,15,6,0.12), rgba(28,15,6,0.22)),
        url("https://images.unsplash.com/photo-1524995997946-a1c2e315a42f?q=80&w=1200&auto=format&fit=crop");
      background-position:right center;
    }

    .center-wrap{
      position:relative;
      z-index:2;
      width:min(780px, 60vw);
      text-align:center;
      padding:34px 22px 34px;
      background:linear-gradient(var(--paper), var(--paper-2));
      border:2px solid rgba(177,130,41,0.58);
      border-radius:26px;
      box-shadow:
        0 22px 50px rgba(0,0,0,0.22),
        inset 0 0 0 1px rgba(255,255,255,0.30);
      backdrop-filter:blur(1.4px);
    }

    .center-wrap::before{
      content:"";
      position:absolute;
      inset:14px;
      border:2px solid rgba(176,127,39,0.40);
      border-radius:20px;
      pointer-events:none;
    }

    .corner{
      position:absolute;
      width:42px;
      height:42px;
      border-color:rgba(72,45,20,0.95);
      z-index:3;
      pointer-events:none;
    }

    .corner.tl{top:24px; left:24px; border-top:2px solid; border-left:2px solid; border-top-left-radius:10px;}
    .corner.tr{top:24px; right:24px; border-top:2px solid; border-right:2px solid; border-top-right-radius:10px;}
    .corner.bl{bottom:24px; left:24px; border-bottom:2px solid; border-left:2px solid; border-bottom-left-radius:10px;}
    .corner.br{bottom:24px; right:24px; border-bottom:2px solid; border-right:2px solid; border-bottom-right-radius:10px;}

    .gmp{
      font-family:"Great Vibes", cursive;
      font-size:clamp(88px, 8.8vw, 145px);
      line-height:0.9;
      color:var(--gold);
      text-shadow:
        0 1px 0 #fff6db,
        0 2px 0 #ecd59c,
        0 4px 0 #c89b43,
        0 8px 16px rgba(90,57,13,0.18);
      margin-top:10px;
      margin-bottom:-4px;
    }

    .title{
      font-family:"Great Vibes", cursive;
      font-size:clamp(54px, 5.2vw, 82px);
      line-height:1;
      color:var(--brown-dark);
      margin-bottom:8px;
    }

    .divider{
      width:220px;
      max-width:80%;
      height:18px;
      margin:0 auto 18px;
      position:relative;
    }

    .divider::before,
    .divider::after{
      content:"";
      position:absolute;
      top:50%;
      width:42%;
      height:1.6px;
      background:linear-gradient(to right, transparent, var(--gold-soft), transparent);
    }

    .divider::before{ left:0; }
    .divider::after{ right:0; }

    .divider span{
      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%,-52%);
      color:var(--gold);
      font-size:18px;
    }

    .subtitle{
      font-size:clamp(26px, 2.5vw, 40px);
      color:var(--brown-soft);
      line-height:1.08;
      margin-bottom:28px;
      padding:0 8px;
    }

    .book-link{
      display:block;
      width:min(540px, 94%);
      margin:0 auto;
      text-decoration:none;
      color:inherit;
      border-radius:22px;
    }

    .book-card{
      background:linear-gradient(180deg, rgba(252,247,236,0.98), rgba(240,228,198,0.97));
      border:2px solid rgba(190,144,55,0.74);
      border-radius:22px;
      padding:20px 18px;
      display:flex;
      align-items:center;
      gap:18px;
      text-align:left;
      box-shadow:
        0 14px 30px rgba(79,49,12,0.12),
        inset 0 0 0 1px rgba(255,255,255,0.32);
      position:relative;
      transition:transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
    }

    .book-card::before{
      content:"";
      position:absolute;
      inset:10px;
      border:1px solid rgba(194,151,65,0.28);
      border-radius:15px;
      pointer-events:none;
    }

    .book-link:hover .book-card,
    .book-link:active .book-card{
      transform:translateY(-2px);
      box-shadow:
        0 18px 34px rgba(79,49,12,0.18),
        inset 0 0 0 1px rgba(255,255,255,0.32);
      border-color:rgba(190,144,55,0.95);
    }

    .book-cover{
      flex:0 0 110px;
      width:110px;
      height:150px;
      border-radius:12px;
      background:url("images/gabriil-cover.jpg") center/cover no-repeat;
      border:1px solid rgba(171,123,34,0.35);
      box-shadow:0 8px 18px rgba(0,0,0,0.18);
    }

    .book-info h3{
      font-size:clamp(36px, 3.7vw, 52px);
      color:var(--brown-mid);
      margin-bottom:4px;
      font-weight:700;
      line-height:1.02;
    }

    .book-author{
      font-size:clamp(22px, 2vw, 30px);
      color:var(--gold-deep);
      margin-bottom:8px;
      font-weight:600;
    }

    .book-info p{
      font-size:clamp(22px, 1.9vw, 28px);
      color:var(--brown-soft);
      line-height:1.10;
    }

    @media (max-width:1100px){
      .shelf{width:19%; min-width:90px;}
      .center-wrap{width:min(760px, 66vw);}
    }

    @media (max-width:900px){
      .page{padding:14px 6px 18px;}
      .shelf{width:16%; min-width:62px;}
      .center-wrap{width:76vw; padding:28px 14px 30px;}
      .book-link{width:min(460px, 96%);}
      .book-cover{width:92px; height:126px; flex-basis:92px;}
      .book-info h3{font-size:32px;}
      .book-author{font-size:22px;}
      .book-info p{font-size:20px;}
    }

    @media (max-width:640px){
      .shelf{display:block; width:12%; min-width:44px;}
      .center-wrap{width:84vw; padding:22px 10px 24px; border-radius:22px;}
      .center-wrap::before{inset:10px; border-radius:16px;}
      .corner{width:28px; height:28px;}
      .corner.tl{ top:16px; left:16px; }
      .corner.tr{ top:16px; right:16px; }
      .corner.bl{ bottom:16px; left:16px; }
      .corner.br{ bottom:16px; right:16px; }
      .gmp{font-size:74px;}
      .title{font-size:42px; margin-bottom:8px;}
      .subtitle{font-size:18px; margin-bottom:20px;}
      .book-card{padding:16px 10px; gap:10px; flex-direction:column; text-align:center;}
      .book-cover{width:120px; height:168px; flex-basis:120px;}
      .book-info h3{font-size:28px;}
      .book-author{font-size:18px;}
      .book-info p{font-size:17px;}
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="shelf left"></div>
    <div class="shelf right"></div>

    <section class="center-wrap">
      <span class="corner tl"></span>
      <span class="corner tr"></span>
      <span class="corner bl"></span>
      <span class="corner br"></span>

      <h1 class="gmp">GMP</h1>
      <h2 class="title">Golden Pages</h2>

      <div class="divider"><span>✦</span></div>

      <p class="subtitle">Ο κόσμος των βιβλίων<br>στα χέρια σου</p>

      <a class="book-link" href="vivlia.html">
        <div class="book-card">
          <div class="book-cover"></div>
          <div class="book-info">
            <h3>ΓΑΒΡΙΗΛ</h3>
            <div class="book-author">Ο Μικρός Που Νικούσε το Σκοτάδι</div>
            <p>Πάτησε εδώ για να δεις το βιβλίο και το εξώφυλλό του.</p>
          </div>
        </div>
      </a>
    </section>
  </main>
</body>
</html>
